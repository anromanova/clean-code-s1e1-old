<!DOCTYPE html>
<html>
<head>
  <title>Todo App</title>
<link href="https://fonts.googleapis.com/css?family=Lato:300,400,700" rel="stylesheet">
<link rel="stylesheet" href="style.css" media="screen" charset="utf-8">
</head>
<body class="page">
<header class="header">
  <img class="header-img" src="./eisenhower-matrix.jpg" alt="the eisenhower matrix">
  <a class="more-info" href="https://goal-life.com/page/method/matrix-eisenhower">
      Want more details?
  </a>
</header>
<main class="main">
  <section class="section">
    <h3 class="tasks-title add-new-task">Add Item</h3>
    <div class="task-row-wrapper">
      <input class="task__input new-task" type="text">
      <button class="button add-task__button">Add</button>
    </div>
  </section>
  <section class="section">
    <h3 class="tasks-title">Todo</h3>
    <ul class="tasks" id="incomplete-tasks">
      <li class="tasks-item">
        <input class="task__input" type="checkbox">
        <label class="task__label">Pay Bills</label>
        <input class="task__input" type="text">
        <button class="button edit-task__button">Edit</button>
        <button class="button delete-task__button">
          <img class="delete-task__button-img" src="./remove.svg" alt="">
        </button>
      </li>
      <li class="tasks-item edit-mode">
        <input type="checkbox">
        <label class="task">Go Shopping</label>
        <input type="text" value="Go Shopping" class="task">
        <button class="edit">Save</button>
        <button class="button delete-task__button">
          <img class="delete-task__button-img" src="./remove.svg" alt="">
        </button>
      </li>
    </ul>
  </section>
  <section class="section">
    <h3 class="tasks-title">Completed</h3>
    <ul class="tasks" id="completed-tasks">
      <li class="tasks-item">
        <input class="task__input" type="checkbox" checked>
        <label class="task__label">See the Doctor</label>
        <input class="task__input" type="text">
        <button class="button edit-task__button">Edit</button>
        <button class="button delete-task__button">
          <img class="delete-task__button-img" src="./remove.svg" alt="">
        </button>
      </li>
    </ul>
  </section>
</main>
<script src="app.js"></script>
</body>
</html>
